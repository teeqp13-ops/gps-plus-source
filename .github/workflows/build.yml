name: Build WolFox GPS DEB

on:
  push:
    branches: [main, build/fix-activation-deb]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Build rootless package
        run: |
          set -euxo pipefail
          make clean || true
          make package FINALPACKAGE=1

      - name: Collect packages
        if: always()
        run: |
          mkdir -p artifacts
          find . -type f -name '*.deb' -not -path './.git/*' -exec cp -v {} artifacts/ \;
          find artifacts -maxdepth 1 -type f -print

      - name: Upload DEB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WolFox-GPS-DEB
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30
