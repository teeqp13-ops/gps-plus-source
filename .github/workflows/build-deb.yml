name: Build WolFox GPS DEB

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl sudo git make perl build-essential fakeroot xz-utils unzip libplist-utils

      - name: Verify project files
        run: |
          pwd
          ls -la
          test -f Makefile
          test -f Tweak.xm
          test -f control
          test -f WolFoxGPS.plist
          grep -q 'WolFoxGPS_FILES.*Tweak.xm' Makefile

      - name: Install Theos, toolchain and SDKs
        run: |
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -d "$THEOS"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          test -n "$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"
          "$THEOS/toolchain/linux/iphone/bin/clang" --version

      - name: Build rootless package
        working-directory: ${{ github.workspace }}
        run: |
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless messages=yes

      - name: Collect packages
        run: |
          mkdir -p artifacts
          find packages -type f -name '*.deb' -exec cp -v {} artifacts/ \;
          test -n "$(find artifacts -type f -name '*.deb' -print -quit)"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: WolFox-GPS-DEB
          path: artifacts/*.deb
          if-no-files-found: error
          retention-days: 30
