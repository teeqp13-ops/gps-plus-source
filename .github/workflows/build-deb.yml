name: Build WolFox GPS DEB

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash curl sudo git make perl build-essential fakeroot xz-utils unzip libplist-utils

      - name: Verify project files
        run: |
          ls -la
          test -f Makefile
          test -f Tweak.xm
          test -f LicenseGate.xm
          test -f control
          test -f WolFoxGPS.plist

      - name: Fix source compatibility
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('LicenseGate.xm')
          s = p.read_text()
          old = 'NSString *clean = [[code ?: @""] stringByTrimmingCharactersInSet:NSCharacterSet.whitespaceAndNewlineCharacterSet];'
          new = 'NSString *sourceCode = code ? code : @"";\n    NSString *clean = [sourceCode stringByTrimmingCharactersInSet:NSCharacterSet.whitespaceAndNewlineCharacterSet];'
          if old not in s:
              raise SystemExit('target line not found')
          p.write_text(s.replace(old, new, 1))
          PY

      - name: Install Theos, toolchain and SDKs
        run: |
          rm -rf "$THEOS"
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          test -n "$(find "$THEOS/sdks" -maxdepth 1 -type d -name '*.sdk' -print -quit)"

      - name: Build rootless package
        shell: bash
        run: |
          set +e
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless messages=yes -j1 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo ""
          echo "========== BUILD ERRORS =========="
          grep -nE 'error:|fatal error:|Undefined symbols|duplicate symbol|ld:|make\[[0-9]+\]: \*\*\*' build.log || true
          echo "=================================="
          exit "$status"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WolFox-GPS-Build-Log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Collect packages
        if: success()
        run: |
          mkdir -p artifacts
          find packages -type f -name '*.deb' -exec cp -v {} artifacts/ \;
          test -n "$(find artifacts -type f -name '*.deb' -print -quit)"

      - name: Upload DEB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WolFox-GPS-DEB
          path: artifacts/*.deb
          if-no-files-found: error
          retention-days: 30